<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>见·物 — 三维文物展示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
@font-face { font-family:'JFSeal'; src:url('JFZSKSealScript_V3.ttf') format('truetype'); }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --dark:     #0f1509;
  --dark2:    #141c0b;
  --gold:     #c8a96e;
  --gold-dim: #8a7048;
  --gold-pale:rgba(200,169,110,.1);
  --text:     #d4c9aa;
  --muted:    #6a6855;
  --rust:     #9b6b3a;
}

html,body { height:100%; overflow:hidden; color:var(--text);
  font-family:'Noto Serif SC',serif; cursor:none;
  background:
    radial-gradient(ellipse 70% 65% at 50% 48%,
      #1e2e10 0%,
      #141d0c 35%,
      #0e1508 65%,
      #080e04 100%);
}
#threeCanvas {
  background: transparent;
}

/* ── cursor ── */
#cur     { position:fixed; width:6px; height:6px; border-radius:50%; background:var(--gold);
           pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
#cur-ring{ position:fixed; width:26px; height:26px; border-radius:50%;
           border:1px solid rgba(200,169,110,.45); pointer-events:none; z-index:9998;
           transform:translate(-50%,-50%); transition:left .08s,top .08s; }

/* ── ancient grid pattern ── */
body::before {
  content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(100%2C140%2C50%2C0.045)' stroke-width='0.5'%3E%3Crect x='5' y='5' width='50' height='50'/%3E%3Crect x='12' y='12' width='36' height='36'/%3E%3Cline x1='5' y1='30' x2='55' y2='30'/%3E%3Cline x1='30' y1='5' x2='30' y2='55'/%3E%3Ccircle cx='30' cy='30' r='8'/%3E%3C/g%3E%3C/svg%3E");
  background-size: 220px 220px, 60px 60px;
  opacity: .06;
  mix-blend-mode: overlay;
}

/* ── vignette ── */
body::after {
  content:''; position:fixed; inset:0; z-index:2; pointer-events:none;
  background: radial-gradient(ellipse 92% 88% at 50% 50%,
    transparent 30%, rgba(4,6,3,.35) 68%, rgba(2,4,1,.82) 100%);
}

/* ── nav ── */
nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:.9rem 2.5rem;
  background: linear-gradient(to bottom, rgba(10,14,8,.92) 0%, transparent 100%);
  border-bottom: 1px solid rgba(200,169,110,.07);
}
.nav-back {
  display:flex; align-items:center; gap:.6rem;
  text-decoration:none; font-size:.75rem; letter-spacing:.25em;
  color:var(--muted); transition:color .3s; cursor:none;
}
.nav-back:hover { color:var(--gold); }
.nav-back-arrow {
  display:inline-block; width:18px; height:1px; background:currentColor;
  position:relative;
}
.nav-back-arrow::before {
  content:''; position:absolute; left:0; top:-3px;
  border:3px solid transparent; border-right:4px solid currentColor;
}
.nav-links { display:flex; gap:2rem; list-style:none; }
.nav-links a { text-decoration:none; font-size:.82rem; letter-spacing:.25em;
  color:var(--muted); transition:color .3s; cursor:none; }
.nav-links a:hover { color:var(--gold); }

/* ── main layout ── */
.stage {
  position: fixed; inset:0; z-index:10;
  display: flex; flex-direction:column;
  align-items:center; justify-content:center;
}

/* artifact info — top right */
.artifact-info {
  position: fixed;
  top: 72px;
  right: 230px; /* gap from info-panel (200px + 30px) */
  text-align: right;
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity .7s ease, transform .7s ease;
}
.artifact-info.visible {
  opacity: 1;
  transform: translateY(0);
}
.artifact-info.hiding {
  opacity: 0;
  transform: translateY(-8px);
}
.artifact-label {
  font-size:.58rem; letter-spacing:.45em; color:var(--rust);
  margin-bottom:.45rem;
  display:flex; align-items:center; justify-content:flex-end; gap:.7rem;
}
.artifact-label::after { content:''; width:24px; height:1px; background:var(--rust); opacity:.5; }
.artifact-title {
  font-family:'Ma Shan Zheng',cursive; font-size:2rem;
  letter-spacing:.2em; color:var(--text);
  text-shadow: 0 0 40px rgba(200,169,110,.18);
  margin-bottom:.4rem;
}
.artifact-meta {
  font-size:.62rem; letter-spacing:.28em; color:var(--muted); line-height:2;
}

/* Three.js canvas */
#threeCanvas {
  position: fixed; inset:0; z-index:5;
  display:block;
}

/* ── bottom controls ── */
.controls {
  position: absolute;
  bottom: 2.5rem; left:50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex; flex-direction: column;
  align-items: center; gap: 1.2rem;
}

/* artifact switcher */
.switcher {
  display: flex; align-items:center; gap:1rem;
}

.artifact-thumb {
  display: flex; flex-direction:column; align-items:center; gap:.4rem;
  cursor: none;
}
.thumb-btn {
  width: 48px; height: 48px;
  border: 1px solid rgba(200,169,110,.18);
  background: rgba(15,21,9,.85);
  display: flex; align-items:center; justify-content:center;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.thumb-btn::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(200,169,110,.06), transparent);
}
.thumb-btn:hover { border-color:rgba(200,169,110,.45); background:rgba(25,36,14,.9); }
.thumb-btn.active {
  border-color:rgba(200,169,110,.6);
  background:rgba(30,44,15,.95);
  box-shadow: 0 0 14px rgba(200,169,110,.15), inset 0 0 8px rgba(200,169,110,.05);
}
.thumb-icon { font-size:1.2rem; opacity:.7; }
.thumb-btn.active .thumb-icon { opacity:1; }
.thumb-label {
  font-size:.52rem; letter-spacing:.2em; color:var(--muted);
  text-align:center; white-space:nowrap;
}
.thumb-btn.active + .thumb-label { color:var(--gold-dim); }

/* active indicator dot */
.thumb-dot {
  width:3px; height:3px; border-radius:50%;
  background: var(--gold); opacity:0;
  transition: opacity .3s;
}
.artifact-thumb.active .thumb-dot { opacity:1; }

/* separator */
.ctrl-sep { width:1px; height:36px; background:rgba(200,169,110,.1); margin:0 .3rem; }

/* action buttons row */
.actions {
  display:flex; align-items:center; gap:.8rem;
}

.act-btn {
  display: flex; flex-direction:column; align-items:center; gap:.4rem;
  cursor:none;
}
.act-btn-inner {
  width: 44px; height: 44px;
  border: 1px solid rgba(200,169,110,.15);
  background: rgba(15,21,9,.85);
  display: flex; align-items:center; justify-content:center;
  transition: all .3s;
  position:relative;
}
.act-btn-inner svg { transition: transform .3s; }
.act-btn-inner:hover { border-color:rgba(200,169,110,.4); }
.act-btn-inner:hover svg { transform: scale(1.12); }
.act-label { font-size:.52rem; letter-spacing:.18em; color:var(--muted); }

/* ── EXPLODE BUTTON — prominent ── */
.act-btn.explode .act-btn-inner {
  width: 52px; height: 52px;
  border-color: rgba(200,140,60,.4);
  background: rgba(30,20,8,.9);
  box-shadow: 0 0 0 1px rgba(200,140,60,.08), 0 0 20px rgba(200,140,60,.08);
}
.act-btn.explode .act-btn-inner::before {
  content:'';
  position:absolute; inset:-1px;
  border:1px solid rgba(200,140,60,.25);
  animation: explodePulse 2.5s ease-in-out infinite;
}
@keyframes explodePulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0; transform:scale(1.35); }
}
.act-btn.explode .act-btn-inner:hover {
  border-color:rgba(220,160,70,.7);
  box-shadow: 0 0 22px rgba(200,140,60,.3);
}
.act-btn.explode .act-label { color:rgba(200,140,60,.75); }
.act-btn.explode.active .act-btn-inner {
  background:rgba(50,30,8,.95);
  border-color:rgba(220,160,70,.8);
  box-shadow: 0 0 28px rgba(200,140,60,.4);
}

/* rotate hint */
.rotate-hint {
  font-size:.55rem; letter-spacing:.25em; color:rgba(106,104,85,.4);
  display:flex; align-items:center; gap:.5rem;
}
.rotate-hint svg { opacity:.3; }

/* info panel — right side */
.info-panel {
  position:fixed; right:2rem; top:50%;
  transform:translateY(-50%);
  z-index:20;
  width:200px;
  display:flex; flex-direction:column; gap:1.2rem;
  transition: opacity .4s;
}
.info-card {
  background:linear-gradient(135deg,rgba(20,30,10,.88),rgba(14,22,8,.92));
  border:1px solid rgba(200,169,110,.1);
  border-right:1px solid rgba(200,169,110,.28);
  padding:.9rem 1rem;
  position:relative;
}
.info-card::after {
  content:''; position:absolute;
  top:10%; right:0; width:1px; height:80%;
  background:linear-gradient(to bottom, transparent, rgba(200,169,110,.4) 30%,
    rgba(200,169,110,.4) 70%, transparent);
}
.info-key { font-size:.55rem; letter-spacing:.3em; color:var(--muted); margin-bottom:.3rem; }
.info-val { font-size:.82rem; letter-spacing:.08em; color:var(--text); line-height:1.7; }

/* explode label hint */
.explode-hint {
  position:fixed; left:50%; top:50%;
  transform:translate(-50%, -50%);
  margin-left:-420px;
  z-index:20; width:180px;
  font-size:.75rem; letter-spacing:.18em; color:var(--muted);
  line-height:2.2; opacity:0;
  transition:opacity .5s;
  border-left:1px solid rgba(200,169,110,.18);
  padding-left:1.2rem;
}
.explode-hint.visible { opacity:1; }
.explode-hint-title { color:var(--gold-dim); letter-spacing:.28em; font-size:.82rem; margin-bottom:.6rem; }

/* ── BGM floating ball ── */
#bgmBall {
  position: fixed;
  bottom: 2.2rem; left: 2rem;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(12,18,8,.82);
  border: 1px solid rgba(200,169,110,.3);
  backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 9000;
  transition: border-color .3s, box-shadow .3s, transform .3s;
  box-shadow: 0 0 0 0 rgba(200,169,110,0);
}
#bgmBall:hover {
  border-color: rgba(200,169,110,.65);
  transform: scale(1.08);
  box-shadow: 0 0 14px rgba(200,169,110,.18);
}
#bgmBall.playing {
  border-color: rgba(200,169,110,.5);
  animation: bgmPulse 2.8s ease-in-out infinite;
}
@keyframes bgmPulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(200,169,110,.07), 0 0 16px rgba(200,169,110,.1); }
  50%      { box-shadow: 0 0 0 7px rgba(200,169,110,.03), 0 0 26px rgba(200,169,110,.18); }
}
#bgmBall svg { width:18px; height:18px; transition: opacity .2s; }
#bgmDisc {
  position: absolute; inset: 5px;
  border-radius: 50%;
  background: conic-gradient(
    rgba(200,169,110,.18) 0deg, transparent 30deg,
    rgba(200,169,110,.12) 60deg, transparent 90deg,
    rgba(200,169,110,.16) 120deg, transparent 150deg,
    rgba(200,169,110,.1) 180deg, transparent 210deg,
    rgba(200,169,110,.14) 240deg, transparent 270deg,
    rgba(200,169,110,.12) 300deg, transparent 330deg,
    rgba(200,169,110,.18) 360deg
  );
  opacity: 0;
  transition: opacity .4s;
}
#bgmBall.playing #bgmDisc {
  opacity: 1;
  animation: bgmSpin 8s linear infinite;
}
@keyframes bgmSpin { to { transform: rotate(360deg); } }
#bgmBall.paused #bgmDisc { animation-play-state: paused; }

</style>
</head>

<!-- nav -->

<!-- artifact info top -->
<div class="stage">

  <div class="controls">
    <!-- artifact thumbs switcher -->

          <span class="thumb-icon">🐂</span>

              <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
            </svg>

    <div class="rotate-hint">

        <path d="M5 9l-3 3 3 3"/><path d="M19 9l3 3-3 3"/>

<!-- right info panel -->

  <div class="info-card">

</div>

<!-- left explode hint -->

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ── cursor ── */
const cur = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let mx = innerWidth/2, my = innerHeight/2, rx = mx, ry = my;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function cl(){ requestAnimationFrame(cl);
  cur.style.cssText  = `left:${mx}px;top:${my}px`;
  rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
  ring.style.cssText = `left:${rx}px;top:${ry}px`;
})();

/* ══════════════════════════════════════
   ARTIFACT DATA
══════════════════════════════════════ */
const ARTIFACTS = [
  {
    name:'错银铜牛灯', era:'东汉', mat:'青铜 · 错银',
    size:'高 46.2 cm', loc:'南京博物院',
    meta:'东汉 · 青铜错银 · 高46.2cm · 南京博物院',
    color: 0x7a6030, roughness:.55, metalness:.75,
    // geometry type: 'ox-lamp'
    type:'ox',
    parts: [
      { name:'灯盘', color:0x8a6f35, geo:'disk' },
      { name:'灯罩', color:0x9a7f40, geo:'cone' },
      { name:'牛身', color:0x705828, geo:'body' },
      { name:'底座', color:0x604820, geo:'base' },
    ]
  },
  {
    name:'长信宫灯', era:'西汉', mat:'鎏金青铜',
    size:'高 48 cm', loc:'河北博物院',
    meta:'西汉 · 鎏金青铜 · 高48cm · 河北博物院',
    color:0xa88040, roughness:.4, metalness:.85,
    type:'figure',
    parts:[
      {name:'灯盘',color:0xb89050,geo:'disk'},
      {name:'罩板',color:0xc8a060,geo:'shade'},
      {name:'宫女像',color:0x987030,geo:'figure'},
      {name:'底座',color:0x806020,geo:'base'},
    ]
  },
  {
    name:'雁鱼灯', era:'西汉', mat:'青铜鎏金',
    size:'高 53 cm', loc:'山西博物院',
    meta:'西汉 · 青铜鎏金 · 高53cm · 山西博物院',
    color:0x7a8a50, roughness:.5, metalness:.78,
    type:'goose',
    parts:[
      {name:'雁身',color:0x8a9a58,geo:'body'},
      {name:'雁颈',color:0x7a8a50,geo:'neck'},
      {name:'雁头',color:0x6a7a44,geo:'head'},
      {name:'灯盘',color:0x9aaa60,geo:'disk'},
      {name:'灯罩',color:0x8a9a54,geo:'shade'},
    ]
  },
  {
    name:'豆形灯', era:'战国', mat:'青铜',
    size:'高 24 cm', loc:'故宫博物院',
    meta:'战国 · 青铜 · 高24cm · 故宫博物院',
    color:0x4a6838, roughness:.62, metalness:.68,
    type:'bean',
    parts:[
      {name:'灯盘',color:0x5a7848,geo:'disk'},
      {name:'灯柱',color:0x4a6838,geo:'stem'},
      {name:'底座',color:0x3a5828,geo:'base'},
      {name:'灯罩',color:0x6a8850,geo:'shade'},
    ]
  },
];

let currentIdx  = 0;
let isExploded  = false;
let autoRotate  = true;
let wireframe   = false;

/* ══════════════════════════════════════
   THREE.JS SETUP
══════════════════════════════════════ */
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, premultipliedAlpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
camera.position.set(0, 1.2, 5);

function resize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();

/* ── load artifact ── */
let currentMesh = null;
let explodedParts = [];
const EXPLODE_OFFSETS = [
  new THREE.Vector3(-1.2, .6, 0),
  new THREE.Vector3(0, 1.4, 0),
  new THREE.Vector3(1.2, .6, 0),
  new THREE.Vector3(-1.0, -.4, .8),
  new THREE.Vector3(1.0, -.4, .8),
  new THREE.Vector3(0, -.6, -1.0),
  new THREE.Vector3(.8, .2, -1.0),
];

function loadArtifact(idx) {
  // remove old
  if (currentMesh) {
    artifactGroup.remove(currentMesh);
    currentMesh.traverse(c => { if(c.geometry) c.geometry.dispose(); });
  }
  isExploded = false;
  document.getElementById('btnExplode').classList.remove('active');
  document.getElementById('explodeHint').classList.remove('visible');

  currentMesh = buildArtifact(idx, wireframe);
  artifactGroup.add(currentMesh);

  // show artifact info, auto-hide after 30s
  const info = document.getElementById('artifactInfo');
  clearTimeout(window._infoTimer);
  info.classList.remove('hiding');
  info.classList.add('visible');
  window._infoTimer = setTimeout(() => {
    info.classList.add('hiding');
    setTimeout(() => info.classList.remove('visible','hiding'), 700);
  }, 30000);

  // entrance animation
  currentMesh.scale.set(0,0,0);
  const start = performance.now();
  function entryAnim(now) {
    const t = Math.min((now - start)/600, 1);
    const ease = 1 - Math.pow(1-t, 3);
    currentMesh.scale.setScalar(ease);
    if(t<1) requestAnimationFrame(entryAnim);
  }
  requestAnimationFrame(entryAnim);

  // update info
  const a = ARTIFACTS[idx];
  document.getElementById('aTitle').textContent = a.name;
  document.getElementById('aMeta').textContent  = a.meta;
  document.getElementById('iEra').textContent   = a.era;
  document.getElementById('iMat').textContent   = a.mat;
  document.getElementById('iSize').textContent  = a.size;
  document.getElementById('iLoc').textContent   = a.loc;
}

loadArtifact(0);

/* ── explode / reassemble ── */
function toggleExplode() {
  if(!currentMesh) return;
  isExploded = !isExploded;
  const parts = currentMesh.userData.parts || currentMesh.children;
  document.getElementById('btnExplode').classList.toggle('active', isExploded);
  document.getElementById('explodeHint').classList.toggle('visible', isExploded);

  parts.forEach((p, i) => {
    const offset = EXPLODE_OFFSETS[i % EXPLODE_OFFSETS.length];
    const restY  = p.userData.restY ?? 0;
    const targetX = isExploded ? p.position.x + offset.x : 0;
    const targetY = isExploded ? restY + offset.y        : restY;
    const targetZ = isExploded ? p.position.z + offset.z : 0;

    const startPos = p.position.clone();
    const start    = performance.now();
    function animPart(now) {
      const t = Math.min((now - start)/700, 1);
      const ease = t < .5 ? 2*t*t : -1+(4-2*t)*t;
      p.position.x = startPos.x + (targetX - startPos.x) * ease;
      p.position.y = startPos.y + (targetY - startPos.y) * ease;
      p.position.z = startPos.z + (targetZ - startPos.z) * ease;
      if(t<1) requestAnimationFrame(animPart);
    }
    setTimeout(() => requestAnimationFrame(animPart), i*40);
  });
}

/* ── controls: mouse rotates MODEL, wheel zooms camera ── */
let isDragging = false, prevMouse = {x:0,y:0};
let modelRotX = 0, modelRotY = .3;
let camRadius = 5, camRadiusTarget = 5;
// camera stays at a fixed pleasant angle
const CAM_ROT_X = -.18, CAM_ROT_Y = 0;

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  prevMouse = {x:e.clientX, y:e.clientY};
  autoRotate = false;
});
canvas.addEventListener('mouseup',   () => isDragging=false);
canvas.addEventListener('mouseleave',() => isDragging=false);
canvas.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  modelRotY += dx * .009;
  modelRotX += dy * .006;
  modelRotX = Math.max(-1.0, Math.min(1.0, modelRotX));
  prevMouse = {x:e.clientX, y:e.clientY};
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camRadiusTarget += e.deltaY * .005;
  camRadiusTarget = Math.max(2.5, Math.min(9, camRadiusTarget));
}, {passive:false});

/* ── render loop ── */
const clock = new THREE.Clock();
let autoRotY = .3;

(function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // auto-rotate spins the model on Y
  if(autoRotate) {
    modelRotY += dt * .35;
  }

  camRadius += (camRadiusTarget - camRadius) * .08;

  // camera stays at fixed angle
  camera.position.x = camRadius * Math.sin(CAM_ROT_Y) * Math.cos(CAM_ROT_X);
  camera.position.y = camRadius * Math.sin(CAM_ROT_X) + 1.0;
  camera.position.z = camRadius * Math.cos(CAM_ROT_Y) * Math.cos(CAM_ROT_X);
  camera.lookAt(0, -.5, 0);

  // apply rotation to model group
  if(currentMesh) {
    currentMesh.rotation.y = modelRotY;
    currentMesh.rotation.x = modelRotX;
    // gentle float
    currentMesh.position.y = Math.sin(clock.elapsedTime * .7) * .04;
    // ring pulse
    const t = clock.elapsedTime;
    floatRing.material.opacity  = 0.4 + Math.sin(t * 1.2) * 0.15;
    floatRing2.material.opacity = 0.12 + Math.sin(t * .8 + 1) * 0.06;
    floatRing.scale.setScalar(1 + Math.sin(t * .7) * 0.015);
    floatRing2.scale.setScalar(1 + Math.sin(t * .5 + .5) * 0.02);

    // animate expanding pulse rings
    for (let i = pulseRings.length - 1; i >= 0; i--) {
      const pr = pulseRings[i];
      pr.userData.age += 0.012;
      const age = pr.userData.age;           // 0 → 1
      const s = 1 + age * 1.6;              // expand from 1× to 2.6×
      pr.scale.setScalar(s);
      pr.material.opacity = 0.45 * (1 - age); // fade as it grows
      if (age >= 1) {
        scene.remove(pr);
        pr.geometry.dispose();
        pr.material.dispose();
        pulseRings.splice(i, 1);
      }
    }
    glowSprite.material.opacity = 0.6 + Math.sin(t * .9) * 0.12;
  }

  renderer.render(scene, camera);
})();
</script>

<audio id="bgmAudio" loop preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<!-- ── BGM floating ball ── -->
<div id="bgmBall" title="背景音乐">
  <div id="bgmDisc"></div>
  <!-- note icon -->
  <svg id="bgmIconPlay" viewBox="0 0 24 24" fill="none" stroke="rgba(200,169,110,.85)" stroke-width="1.8" stroke-linecap="round">
    <path d="M9 18V6l12-3v12"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/>
  </svg>
  <!-- pause icon -->
  <svg id="bgmIconPause" viewBox="0 0 24 24" fill="none" stroke="rgba(200,169,110,.85)" stroke-width="1.8" stroke-linecap="round" style="display:none">
    <rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>
  </svg>
</div>

<script>
/* ── BGM cross-page persistence ── */
(function() {
  const audio  = document.getElementById('bgmAudio');
  const ball   = document.getElementById('bgmBall');
  const iPlay  = document.getElementById('bgmIconPlay');
  const iPause = document.getElementById('bgmIconPause');
  const KEY_PLAYING = 'bgm_playing';
  const KEY_TIME    = 'bgm_time';

  // 页面音量配置：在这里统一管理各页面的 BGM 音量
  // character_page 需要语音交互，音量压低；其余页面正常
  const PAGE_VOLUME = {
    'character_page.html': 0.12,
    'artifact.html':           0.15,
  };
  const DEFAULT_VOLUME = 0.15;

  function getVolume() {
    const page = location.pathname.split('/').pop();
    return PAGE_VOLUME[page] ?? DEFAULT_VOLUME;
  }

  audio.volume = getVolume();

  let isPlaying = false;

  function setUI(playing) {
    isPlaying = playing;
    ball.classList.toggle('playing', playing);
    ball.classList.toggle('paused',  !playing);
    iPlay.style.display  = playing ? 'none'  : '';
    iPause.style.display = playing ? ''      : 'none';
  }

  function play() {
    audio.play().then(() => {
      setUI(true);
      localStorage.setItem(KEY_PLAYING, '1');
    }).catch(() => {});
  }

  function pause() {
    audio.pause();
    setUI(false);
    localStorage.setItem(KEY_PLAYING, '0');
  }

  // save position periodically
  setInterval(() => {
    if (isPlaying) localStorage.setItem(KEY_TIME, audio.currentTime);
  }, 1000);

  function restoreAndPlay() {
    const t = parseFloat(localStorage.getItem(KEY_TIME) || '0');
    if (t > 0) audio.currentTime = t;
    // play unless user explicitly paused
    if (localStorage.getItem(KEY_PLAYING) !== '0') {
      play();
    } else {
      setUI(false);
    }
  }

  // try immediate autoplay
  audio.addEventListener('canplay', function() {
    restoreAndPlay();
  }, { once: true });

  // fallback: autoplay on first user interaction if browser blocked it
  function onFirstInteraction() {
    if (!isPlaying && localStorage.getItem(KEY_PLAYING) !== '0') {
      play();
    }
    ['click','touchstart','keydown'].forEach(e => document.removeEventListener(e, onFirstInteraction));
  }
  ['click','touchstart','keydown'].forEach(e => document.addEventListener(e, onFirstInteraction, { once: true }));

  ball.addEventListener('click', () => {
    if (isPlaying) pause(); else play();
  });

  // save position before page unload
  window.addEventListener('pagehide', () => {
    localStorage.setItem(KEY_TIME, audio.currentTime);
    localStorage.setItem(KEY_PLAYING, isPlaying ? '1' : '0');
  });
})();
</script>
