<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灯语·见物 — 铜·变</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@font-face { font-family:'JFSeal'; src:url('JFZSKSealScript_V3.ttf') format('truetype'); }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --dark:#0f1509; --dark2:#141c0b;
  --gold:#c8a96e; --gold-dim:#8a7048;
  --text:#d4c9aa; --muted:#6a6855;
  --rust:#9b6b3a; --rust-light:#b8804a;
}
html,body { height:100%; overflow:hidden;
  background:radial-gradient(ellipse 80% 75% at 50% 45%,#1e2e10 0%,#141d0c 40%,#0e1508 70%,#080e04 100%);
  color:var(--text); font-family:'Noto Serif SC',serif; cursor:none; }

body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(100%2C140%2C50%2C0.04)' stroke-width='0.5'%3E%3Crect x='5' y='5' width='50' height='50'/%3E%3Crect x='12' y='12' width='36' height='36'/%3E%3Cline x1='5' y1='30' x2='55' y2='30'/%3E%3Cline x1='30' y1='5' x2='30' y2='55'/%3E%3Ccircle cx='30' cy='30' r='8'/%3E%3C/g%3E%3C/svg%3E");
  background-size:220px 220px,60px 60px; opacity:.06; mix-blend-mode:overlay; }
body::after { content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:radial-gradient(ellipse 94% 90% at 50% 50%,transparent 28%,rgba(4,6,3,.35) 65%,rgba(2,4,1,.82) 100%); }

#cur      { position:fixed; width:6px; height:6px; border-radius:50%; background:var(--gold);
            pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
#cur-ring { position:fixed; width:26px; height:26px; border-radius:50%;
            border:1px solid rgba(200,169,110,.45); pointer-events:none; z-index:9998;
            transform:translate(-50%,-50%); transition:left .06s,top .06s; }

/* ── nav ── */
nav { position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:.85rem 2.2rem;
  background:linear-gradient(to bottom,rgba(8,12,5,.96) 0%,transparent 100%);
  border-bottom:1px solid rgba(200,169,110,.07); }
.nav-back { display:flex; align-items:center; gap:.6rem; text-decoration:none;
  font-size:.72rem; letter-spacing:.25em; color:var(--muted); transition:color .3s; cursor:none; }
.nav-back:hover { color:var(--gold); }
.nav-back-arrow { display:inline-block; width:16px; height:1px; background:currentColor; position:relative; }
.nav-back-arrow::before { content:''; position:absolute; left:0; top:-3px;
  border:3px solid transparent; border-right:4px solid currentColor; }
.nav-title { font-family:'Ma Shan Zheng',cursive; font-size:1rem;
  letter-spacing:.3em; color:var(--gold-dim); opacity:.8; }
.nav-links { display:flex; gap:2rem; list-style:none; }
.nav-links a { text-decoration:none; font-size:.75rem; letter-spacing:.22em;
  color:var(--muted); transition:color .3s; cursor:none; }
.nav-links a:hover { color:var(--gold); }

/* ── layout: 3 columns ── */
.layout {
  position:relative; z-index:10;
  height:100vh; padding-top:52px;
  display:grid;
  grid-template-columns: 220px 1fr 280px;
}

/* ── left: artifact selector ── */
.panel-left {
  border-right:1px solid rgba(200,169,110,.08);
  display:flex; flex-direction:column;
  padding:1.6rem 1.2rem;
  gap:1.2rem; overflow-y:auto;
}
.panel-left::-webkit-scrollbar { width:1px; }
.panel-label {
  font-size:.55rem; letter-spacing:.4em; color:var(--rust-light); opacity:.75;
  display:flex; align-items:center; gap:.5rem; margin-bottom:.2rem;
}
.panel-label::before { content:''; width:10px; height:1px; background:var(--rust-light); opacity:.5; }

.artifact-list { display:flex; flex-direction:column; gap:.6rem; }
.artifact-card {
  border:1px solid rgba(200,169,110,.1); padding:.8rem .9rem;
  background:rgba(15,21,9,.7); cursor:none;
  transition:all .3s; position:relative; overflow:hidden;
}
.artifact-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:linear-gradient(to bottom,transparent,var(--gold-dim),transparent);
  opacity:0; transition:opacity .3s; }
.artifact-card:hover { border-color:rgba(200,169,110,.3); }
.artifact-card:hover::before { opacity:1; }
.artifact-card.active { border-color:rgba(200,169,110,.45); background:rgba(25,38,14,.85); }
.artifact-card.active::before { opacity:1; }
.art-name { font-family:'Ma Shan Zheng',cursive; font-size:.95rem; letter-spacing:.15em;
  color:var(--text); margin-bottom:.2rem; }
.artifact-card.active .art-name { color:var(--gold); }
.art-era  { font-size:.58rem; letter-spacing:.25em; color:var(--muted); }
.art-icon { position:absolute; right:.8rem; top:50%; transform:translateY(-50%);
  opacity:.18; font-size:1.3rem; }

/* current color name display */
.color-name-block {
  border:1px solid rgba(200,169,110,.1); padding:.8rem 1rem;
  background:rgba(10,15,7,.6); margin-top:auto;
}
.color-name-label { font-size:.52rem; letter-spacing:.4em; color:var(--muted); margin-bottom:.3rem; }
.color-name-cn { font-family:'Ma Shan Zheng',cursive; font-size:1.1rem;
  letter-spacing:.15em; color:var(--gold); margin-bottom:.2rem; }
.color-name-desc { font-size:.6rem; letter-spacing:.12em; color:var(--muted); line-height:1.8; }

/* ── center: Three.js canvas ── */
.panel-center {
  position:relative; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden;
}
#threeCanvas { display:block; width:100%; height:100%; }

/* center controls (rotate toggle) */
.center-controls {
  position:absolute; bottom:1.4rem; left:50%; transform:translateX(-50%);
  display:flex; gap:.8rem;
}
.cc-btn {
  padding:.5rem 1.2rem; border:1px solid rgba(200,169,110,.15);
  background:rgba(10,15,7,.85); color:var(--muted);
  font-family:'Noto Serif SC',serif; font-size:.65rem; letter-spacing:.2em;
  cursor:none; transition:all .3s;
}
.cc-btn:hover, .cc-btn.active { border-color:rgba(200,169,110,.4); color:var(--gold-dim); }

/* drag hint */
.drag-hint {
  position:absolute; top:1.4rem; left:50%; transform:translateX(-50%);
  font-size:.6rem; letter-spacing:.25em; color:var(--muted); opacity:.5;
  display:flex; align-items:center; gap:.5rem; pointer-events:none;
  animation:hintFade 4s ease 1.5s both;
}
@keyframes hintFade { 0%{opacity:.5} 80%{opacity:.5} 100%{opacity:0} }

/* glow overlay on canvas */
.canvas-glow {
  position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 60%,
    rgba(200,169,110,.04) 0%, transparent 70%);
}

/* ── right: color palette ── */
.panel-right {
  border-left:1px solid rgba(200,169,110,.08);
  display:flex; flex-direction:column;
  padding:1.6rem 1.4rem 1.4rem 1.2rem;
  gap:1.4rem; overflow-y:auto;
}
.panel-right::-webkit-scrollbar { width:1px; }

.palette-section { display:flex; flex-direction:column; gap:.7rem; }
.palette-section-title {
  font-size:.55rem; letter-spacing:.4em; color:var(--rust-light); opacity:.75;
  display:flex; align-items:center; gap:.5rem;
}
.palette-section-title::before { content:''; width:10px; height:1px; background:var(--rust-light); opacity:.5; }

.swatches { display:flex; flex-direction:column; gap:.45rem; }
.swatch {
  display:flex; align-items:center; gap:.8rem; padding:.5rem .7rem;
  border:1px solid rgba(200,169,110,.07); cursor:none;
  transition:all .25s; position:relative; overflow:hidden;
  background:rgba(12,18,8,.6);
}
.swatch::after { content:''; position:absolute; inset:0;
  background:linear-gradient(to right,rgba(200,169,110,.04),transparent);
  opacity:0; transition:opacity .25s; }
.swatch:hover { border-color:rgba(200,169,110,.3); }
.swatch:hover::after { opacity:1; }
.swatch.active { border-color:rgba(200,169,110,.5); background:rgba(22,34,12,.85); }

.swatch-dot {
  width:24px; height:24px; border-radius:50%;
  border:1px solid rgba(255,255,255,.1); flex-shrink:0;
  position:relative; overflow:hidden;
}
/* animated shimmer on active swatch */
.swatch.active .swatch-dot::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%);
  border-radius:50%;
}

.swatch-info { flex:1; }
.swatch-cn { font-size:.75rem; letter-spacing:.15em; color:var(--text); line-height:1; }
.swatch-en { font-size:.55rem; letter-spacing:.15em; color:var(--muted); margin-top:.2rem; }

/* separator between palette groups */
.palette-sep {
  display:flex; align-items:center; gap:.6rem;
  font-size:.5rem; letter-spacing:.3em; color:var(--muted); opacity:.4;
}
.palette-sep::before,.palette-sep::after { content:''; flex:1; height:1px;
  background:linear-gradient(to right,transparent,rgba(200,169,110,.15)); }
.palette-sep::after { transform:scaleX(-1); }

/* transition indicator */
.transition-bar {
  height:2px; background:rgba(200,169,110,.08); overflow:hidden; margin-top:-.6rem;
}
.transition-fill {
  height:100%; background:linear-gradient(to right,var(--gold-dim),var(--gold));
  width:0%; transition:width .05s linear;
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<nav>
  <a href="games.html" class="nav-back">
    <span class="nav-back-arrow"></span>
    <span>返回游戏</span>
  </a>
  <div class="nav-title">铜·变</div>
  <ul class="nav-links">
    <li><a href="character_page.html">角色对话</a></li>
    <li><a href="artifact.html">文物交互</a></li>
  </ul>
</nav>

<div class="layout">

  <!-- left: artifact selector -->
  <div class="panel-left">
    <div class="panel-label">选择文物</div>
    <div class="artifact-list">
      <div class="artifact-card active" onclick="selectArtifact(0)" id="art0">
        <div class="art-name">错银铜牛灯</div>

      </div>
      <div class="artifact-card" onclick="selectArtifact(1)" id="art1">

        <div class="art-icon">🏮</div>
      </div>
      <div class="artifact-card" onclick="selectArtifact(2)" id="art2">
        <div class="art-name">雁鱼灯</div>
        <div class="art-era">西汉 · 山西博物院</div>
        <div class="art-icon">🦢</div>
      </div>
      <div class="artifact-card" onclick="selectArtifact(3)" id="art3">
        <div class="art-name">豆形灯</div>
        <div class="art-era">战国 · 故宫博物院</div>
        <div class="art-icon">🪔</div>

    </div>

    <div class="panel-label" style="margin-top:.4rem;">前往游戏</div>
    <div class="artifact-list">
      <a href="game1.html" class="artifact-card" style="text-decoration:none;display:block;">

            <rect x="2" y="2" width="9" height="9" rx="1"/><rect x="13" y="2" width="9" height="9" rx="1"/>

          </svg>

      <a href="game3.html" class="artifact-card" style="text-decoration:none;display:block;">

        <div class="art-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(200,169,110,.45)" stroke-width="1.2">
            <rect x="4" y="3" width="16" height="18" rx="2"/>

            <circle cx="17" cy="17" r="3" fill="rgba(8,12,5,.9)"/>
            <path d="M17 15.8v.8M17 17.8v.2" stroke-width="1.4"/>
          </svg>
        </div>
      </a>
    </div>

    <div class="color-name-block">
      <div class="color-name-label">当前色彩</div>
      <div class="color-name-cn" id="colorNameCn">初铸金光</div>
      <div class="color-name-desc" id="colorNameDesc">新铸之时，错银工艺熠熠生辉，表面呈现温润金黄之色</div>
    </div>
  </div>

  <!-- center: 3D canvas -->
  <div class="panel-center">
    <div class="drag-hint">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="8" r="3"/><path d="M12 11v10M9 18l3 3 3-3"/>
      </svg>
      拖拽旋转模型
    </div>
    <canvas id="threeCanvas"></canvas>
    <div class="canvas-glow"></div>
    <div class="center-controls">
      <button class="cc-btn active" id="btnRotate" onclick="toggleRotate()">自动旋转</button>
      <button class="cc-btn" onclick="resetCamera()">复位视角</button>
    </div>
  </div>

  <!-- right: color palette -->
  <div class="panel-right">

    <!-- transition bar -->
    <div class="transition-bar"><div class="transition-fill" id="transBar"></div></div>

    <div class="palette-section">
      <div class="palette-section-title">历史演变</div>
      <div class="swatches" id="swatchHistory">
        <!-- generated by JS -->
      </div>
    </div>

    <div class="palette-sep">特效</div>

    <div class="palette-section">
      <div class="palette-section-title">现代特效</div>
      <div class="swatches" id="swatchFX">
        <!-- generated by JS -->
      </div>
    </div>

  </div>
</div>

<script>
/* ════════════════════════════════════════
   CURSOR
════════════════════════════════════════ */
const cur=document.getElementById('cur');
const ring=document.getElementById('cur-ring');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function cl(){requestAnimationFrame(cl);
  cur.style.left=mx+'px';cur.style.top=my+'px';
  rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
})();

/* ════════════════════════════════════════
   COLOR PALETTE DATA
════════════════════════════════════════ */
const COLORS_HISTORY = [
  { cn:'初铸金光', en:'Gilded Cast',    hex:'#c8923a',
    metalness:.92, roughness:.18, emissive:'#1a0a00',
    desc:'新铸之时，错银工艺熠熠生辉，表面呈温润金黄之色' },
  { cn:'岁月青铜', en:'Aged Bronze',    hex:'#7a9060',
    metalness:.85, roughness:.28, emissive:'#020800',
    desc:'历经百年，铜体表面逐渐生出浅淡的青色包浆' },
  { cn:'斑驳铜绿', en:'Verdigris',      hex:'#4a8060',
    metalness:.75, roughness:.42, emissive:'#000a04',
    desc:'千年氧化，碳酸铜结晶覆满器身，呈翠绿班斓之色' },
  { cn:'锈褐沉积', en:'Rust Patina',    hex:'#7a4828',
    metalness:.68, roughness:.55, emissive:'#050100',
    desc:'铁质混入，铜锈中夹带赭褐，沉郁如古墨' },
  { cn:'千年沉黑', en:'Ancient Black',  hex:'#2a3020',
    metalness:.60, roughness:.70, emissive:'#000000',
    desc:'深埋地下，矿物质渗入铜胎，器表呈深沉黑褐之色' },
];

const COLORS_FX = [
  // ── solid specials ──
  { cn:'赤焰流金',   en:'Crimson Flame',   hex:'#e04828',
    metalness:.97, roughness:.08, emissive:'#280600',
    desc:'以烈焰红铜为意，仿佛熔炉中刚刚铸就的炽热瞬间' },
  { cn:'幽蓝深渊',   en:'Deep Abyss',      hex:'#2050a8',
    metalness:.98, roughness:.05, emissive:'#00081e',
    desc:'冷冽蓝金属质感，如深海之底折射出的神秘光芒' },
  { cn:'月白霜华',   en:'Frost Silver',    hex:'#d8e8f8',
    metalness:.99, roughness:.03, emissive:'#060810',
    desc:'极致抛光银白，镜面流光，冰月清辉之色' },
  { cn:'翠玉生烟',   en:'Jade Mist',       hex:'#30d888',
    metalness:.80, roughness:.20, emissive:'#001a08',
    desc:'融入翡翠之气韵，铜体幻化为碧玉流翠之姿' },
  { cn:'暗金裂纹',   en:'Dark Gilt',       hex:'#907030',
    metalness:.95, roughness:.32, emissive:'#0e0800',
    desc:'暗沉金色配以裂纹质感，透出岁月重压下的华美' },
  { cn:'纯黑镜面',   en:'Obsidian Mirror', hex:'#181c18',
    metalness:.99, roughness:.02, emissive:'#000000',
    desc:'极黑镜面金属，无限反射环境光，如深渊之眼' },
  { cn:'玫瑰铂金',   en:'Rose Platinum',   hex:'#e8a0a0',
    metalness:.98, roughness:.04, emissive:'#100404',
    desc:'玫瑰色铂金光泽，温柔而奢靡，东西方美学的交融' },
  // ── gradient / fx ──
  { cn:'极光渐变',   en:'Aurora Gradient', hex:'#60d8c0',
    metalness:.92, roughness:.10, emissive:'#001818',
    gradient:['#60d8c0','#8060f0','#d060c0'],
    desc:'北极光般的三色渐变，青绿→紫→粉，光谱幻彩流动于器身' },
  { cn:'烈焰渐变',   en:'Fire Gradient',   hex:'#f0a020',
    metalness:.94, roughness:.09, emissive:'#1e0400',
    gradient:['#f0e020','#e06010','#a01008'],
    desc:'熔岩流动的黄橙赤三色渐变，如日落燃烧于铜体之上' },
  { cn:'星空渐变',   en:'Cosmos Gradient', hex:'#4040c0',
    metalness:.96, roughness:.07, emissive:'#020010',
    gradient:['#0808a0','#6030d0','#d020a0'],
    desc:'深空蓝紫渐变，仿佛星河镶嵌于古铜之上，穿越时空' },
  { cn:'孔雀渐变',   en:'Peacock Gradient',hex:'#20a090',
    metalness:.90, roughness:.12, emissive:'#001008',
    gradient:['#20a090','#40d040','#d0c020'],
    desc:'孔雀翎色系，从翠蓝到翠绿再到金黄，流光溢彩' },
  { cn:'霓虹电镀',   en:'Neon Chrome',     hex:'#ffffff',
    metalness:.99, roughness:.01, emissive:'#080818',
    gradient:['#ff0080','#00ffff','#ff8000'],
    neon:true,
    desc:'霓虹灯光在镜面铬合金上的反射，电子朋克式的超现实美感' },
  { cn:'彩虹镀膜',   en:'Rainbow Coat',    hex:'#ff6060',
    metalness:.97, roughness:.03, emissive:'#040004',
    gradient:['#ff4040','#ffff00','#00ff80','#0080ff','#c000ff'],
    desc:'光学镀膜产生的彩虹干涉色，如CD光盘般的七色流转' },
];

/* ════════════════════════════════════════
   BUILD SWATCHES
════════════════════════════════════════ */
let activeSwatchKey = 'h0';

function buildSwatches() {
  const hEl = document.getElementById('swatchHistory');
  const fEl = document.getElementById('swatchFX');
  COLORS_HISTORY.forEach((c,i) => {
    hEl.appendChild(makeSwatchEl(c, `h${i}`));
  });
  COLORS_FX.forEach((c,i) => {
    fEl.appendChild(makeSwatchEl(c, `f${i}`));
  });
}

function makeSwatchEl(c, key) {
  const el = document.createElement('div');
  el.className = 'swatch' + (key==='h0' ? ' active' : '');
  el.id = 'sw_' + key;
  el.setAttribute('data-key', key);
  el.style.cursor = 'none';
  const dotStyle = c.gradient
    ? `background:linear-gradient(135deg,${c.gradient.join(',')});box-shadow:0 0 10px ${c.hex}66;`
    : `background:${c.hex};box-shadow:0 0 8px ${c.hex}55;`;
  el.innerHTML = `
    <div class="swatch-dot" style="${dotStyle}"></div>
    <div class="swatch-info">
      <div class="swatch-cn">${c.cn}</div>
      <div class="swatch-en">${c.en}</div>
    </div>`;
  el.addEventListener('click', () => applyColor(key));
  return el;
}

buildSwatches();

/* ════════════════════════════════════════
   THREE.JS SETUP
════════════════════════════════════════ */
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias:true, alpha:true, powerPreference:'high-performance'
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.physicallyCorrectLights = true;

const scene = new THREE.Scene();
scene.background = null;
scene.fog = new THREE.FogExp2(0x0f1509, 0.08);

const camera = new THREE.PerspectiveCamera(44, 1, 0.1, 100);
camera.position.set(0, 1.2, 5.5);
camera.lookAt(0, -0.3, 0);

// ── lighting ──
const ambientL = new THREE.AmbientLight(0x3a4a2a, 1.2);
scene.add(ambientL);
const hemiL = new THREE.HemisphereLight(0x8a9a70, 0x1a2010, 0.8);
scene.add(hemiL);

const keyL = new THREE.DirectionalLight(0xffe8c0, 2.2);
keyL.position.set(2, 5, 3); keyL.castShadow = true;
keyL.shadow.mapSize.set(1024,1024); keyL.shadow.radius = 10;

const fillL = new THREE.DirectionalLight(0xc8d8e8, 0.6);
fillL.position.set(-3, 1, 2); scene.add(fillL);

const rimL = new THREE.DirectionalLight(0xffb060, 0.8);
rimL.position.set(0, 4, -4); scene.add(rimL);

const underL = new THREE.DirectionalLight(0xc8a050, 0.25);
underL.position.set(0, -3, 1); scene.add(underL);

// FX front point lights (off by default)
const frontPt = new THREE.PointLight(0xfff5e0, 0, 12, 1.5);
frontPt.position.set(0, 0.5, 5); scene.add(frontPt);
const frontPt2 = new THREE.PointLight(0xffecd0, 0, 10, 1.8);
frontPt2.position.set(1.2, 1.5, 4); scene.add(frontPt2);

// lighting presets
const LIGHT_HISTORY = {
  exposure: 1.15,
  ambient: [0x3a4a2a, 1.2], hemi: [0x8a9a70, 0x1a2010, 0.8],
  key: { color: 0xffe8c0, intensity: 2.2, pos: [2,5,3] },
  fill: { color: 0xc8d8e8, intensity: 0.6, pos: [-3,1,2] },
  rim: { color: 0xffb060, intensity: 0.8 },
  under: { color: 0xc8a050, intensity: 0.25 },
  frontPt: 0, frontPt2: 0,
};
const LIGHT_FX = {
  exposure: 1.9,
  ambient: [0x606050, 2.5], hemi: [0xb0c090, 0x303820, 1.4],
  key: { color: 0xfff8e8, intensity: 4.8, pos: [0,2,8] },
  fill: { color: 0xe8f0ff, intensity: 2.0, pos: [-2,1,6] },
  rim: { color: 0xffc070, intensity: 1.2 },
  under: { color: 0xd0b060, intensity: 0.5 },
  frontPt: 6.0, frontPt2: 3.5,
};

function applyLightPreset(p) {
  renderer.toneMappingExposure = p.exposure;
  ambientL.color.set(p.ambient[0]); ambientL.intensity = p.ambient[1];
  hemiL.color.set(p.hemi[0]); hemiL.groundColor.set(p.hemi[1]); hemiL.intensity = p.hemi[2];
  keyL.color.set(p.key.color); keyL.intensity = p.key.intensity;
  keyL.position.set(...p.key.pos);
  fillL.color.set(p.fill.color); fillL.intensity = p.fill.intensity;
  fillL.position.set(...p.fill.pos);
  rimL.color.set(p.rim.color); rimL.intensity = p.rim.intensity;
  underL.color.set(p.under.color); underL.intensity = p.under.intensity;
  frontPt.intensity = p.frontPt;
  frontPt2.intensity = p.frontPt2;
}

// start with history preset
applyLightPreset(LIGHT_HISTORY);

// ── shadow plane ──
const shadowMat = new THREE.ShadowMaterial({ opacity:.12 });
const shadowPlane = new THREE.Mesh(new THREE.PlaneGeometry(60,60), shadowMat);
shadowPlane.rotation.x = -Math.PI/2;
shadowPlane.position.y = -1.3;
shadowPlane.receiveShadow = true;
scene.add(shadowPlane);

// ── floor glow sprite ──
const glowGeo = new THREE.PlaneGeometry(3, 1.2);
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 256; glowCanvas.height = 128;
const gc = glowCanvas.getContext('2d');
const glowGrad = gc.createRadialGradient(128,64,0,128,64,90);
glowGrad.addColorStop(0, 'rgba(200,169,110,.18)');
glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
gc.fillStyle = glowGrad; gc.fillRect(0,0,256,128);
const glowTex = new THREE.CanvasTexture(glowCanvas);
const glowMesh = new THREE.Mesh(glowGeo, new THREE.MeshBasicMaterial({
  map:glowTex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
}));
glowMesh.rotation.x = -Math.PI/2;
glowMesh.position.y = -1.28;
scene.add(glowMesh);

/* ════════════════════════════════════════
   ARTIFACT GEOMETRY BUILDERS
════════════════════════════════════════ */
function buildOxLamp(mat) {
  const g = new THREE.Group();
  // body
  const body = new THREE.Mesh(new THREE.SphereGeometry(.65,.32,24,0,Math.PI*2,0,Math.PI*.72), mat);
  body.position.y = .1; body.castShadow = true; g.add(body);
  // legs
  [-.3,-.1,.1,.3].forEach((xOff,i) => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(.05,.06,.55,12), mat);
    leg.position.set(xOff, -.38, i<2?.12:-.12); leg.castShadow=true; g.add(leg);
  });
  // neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(.1,.14,.55,16), mat);
  neck.position.set(-.45,.22,0); neck.rotation.z = Math.PI*.25; neck.castShadow=true; g.add(neck);
  // head
  const head = new THREE.Mesh(new THREE.SphereGeometry(.2,24,18), mat);
  head.position.set(-.72,.52,0); head.castShadow=true; g.add(head);
  // lamp dish
  const dish = new THREE.Mesh(new THREE.CylinderGeometry(.35,.28,.08,32), mat);
  dish.position.set(.2,.52,0); dish.castShadow=true; g.add(dish);
  // lamp shade
  const shade = new THREE.Mesh(new THREE.ConeGeometry(.3,.45,32), mat);
  shade.position.set(.2,.82,0); shade.castShadow=true; g.add(shade);
  return g;
}

function buildFigureLamp(mat) {
  const g = new THREE.Group();
  // body
  const body = new THREE.Mesh(new THREE.CylinderGeometry(.2,.28,.7,24), mat);
  body.position.y = .0; body.castShadow=true; g.add(body);
  // head
  const head = new THREE.Mesh(new THREE.SphereGeometry(.18,24,18), mat);
  head.position.y = .56; head.castShadow=true; g.add(head);
  // arms
  [-1,1].forEach(s => {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,.5,12), mat);
    arm.position.set(s*.32, .28, 0); arm.rotation.z = -s*Math.PI*.35; arm.castShadow=true; g.add(arm);
  });
  // lamp (held)
  const lamp = new THREE.Mesh(new THREE.SphereGeometry(.22,24,18,0,Math.PI*2,0,Math.PI*.55), mat);
  lamp.position.set(.42,.52,0); lamp.castShadow=true; g.add(lamp);
  const shade = new THREE.Mesh(new THREE.ConeGeometry(.18,.3,24), mat);
  shade.position.set(.42,.72,0); shade.castShadow=true; g.add(shade);
  return g;
}

function buildGoose(mat) {
  const g = new THREE.Group();
  // body
  const body = new THREE.Mesh(new THREE.SphereGeometry(.42,28,20,.0,Math.PI*2,.0,Math.PI*.78), mat);
  body.scale.set(1,.75,1.2); body.position.y = .06; body.castShadow=true; g.add(body);
  // neck (S-curve via cylinders)
  for(let i=0;i<5;i++){
    const seg = new THREE.Mesh(new THREE.CylinderGeometry(.08,.1,.26,14), mat);
    const t = i/4;
    seg.position.set(Math.sin(t*1.4)*.2-.02, .38+t*.52, 0);
    seg.rotation.z = Math.sin(t*1.4)*.35;
    seg.castShadow=true; g.add(seg);
  }
  // head
  const head = new THREE.Mesh(new THREE.SphereGeometry(.14,20,16), mat);
  head.position.set(.18,1.02,0); head.castShadow=true; g.add(head);
  // fish
  const fish = new THREE.Mesh(new THREE.SphereGeometry(.12,16,12,0,Math.PI*2,0,Math.PI*.7), mat);
  fish.scale.set(1,.5,1.6); fish.position.set(.22,1.02,.22); fish.castShadow=true; g.add(fish);
  // lamp dish
  const dish = new THREE.Mesh(new THREE.CylinderGeometry(.32,.26,.07,28), mat);
  dish.position.y = .52; dish.castShadow=true; g.add(dish);
  // shade
  const shade = new THREE.Mesh(new THREE.SphereGeometry(.28,24,14,0,Math.PI*2,0,Math.PI*.5), mat);
  shade.position.y = .62; shade.castShadow=true; g.add(shade);
  // feet
  [-1,1].forEach(s => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(.04,.05,.3,10), mat);
    leg.position.set(s*.14,-.3,0); leg.castShadow=true; g.add(leg);
  });
  return g;
}

function buildBean(mat) {
  const g = new THREE.Group();
  // dish
  const dish = new THREE.Mesh(new THREE.SphereGeometry(.42,28,14,0,Math.PI*2,0,Math.PI*.48), mat);
  dish.position.y = .55; dish.castShadow=true; g.add(dish);
  const rim  = new THREE.Mesh(new THREE.TorusGeometry(.42,.025,12,40), mat);
  rim.position.y = .55; rim.castShadow=true; g.add(rim);
  // shade dome
  const dome = new THREE.Mesh(new THREE.SphereGeometry(.34,24,14,0,Math.PI*2,0,Math.PI*.52), mat);
  dome.position.y = .64; dome.castShadow=true; g.add(dome);
  // stem
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(.045,.07,.7,16), mat);
  stem.position.y = .2; stem.castShadow=true; g.add(stem);
  // knob
  const knob = new THREE.Mesh(new THREE.SphereGeometry(.085,16,12), mat);
  knob.position.y = .42; knob.castShadow=true; g.add(knob);
  // base
  const base = new THREE.Mesh(new THREE.CylinderGeometry(.38,.26,.12,28), mat);
  base.position.y = -.15; base.castShadow=true; g.add(base);
  return g;
}

const BUILDERS = [buildOxLamp, buildFigureLamp, buildGoose, buildBean];

/* ════════════════════════════════════════
   MATERIAL & COLOR SYSTEM
════════════════════════════════════════ */
// gradient texture helper
function makeGradientTex(stops, neon=false) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, c.width, c.height);
  stops.forEach((s,i) => grad.addColorStop(i/(stops.length-1), s));
  ctx.fillStyle = grad; ctx.fillRect(0,0,c.width,c.height);
  // overlay diagonal stripes for neon effect
  if(neon) {
    for(let i=0;i<c.width;i+=18){
      const g2 = ctx.createLinearGradient(i,0,i+8,c.height);
      g2.addColorStop(0,'rgba(255,255,255,0)');
      g2.addColorStop(.5,'rgba(255,255,255,.08)');
      g2.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=g2; ctx.fillRect(i,0,8,c.height);
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

let activeTex = null; // current gradient texture or null

const mat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(COLORS_HISTORY[0].hex),
  metalness: COLORS_HISTORY[0].metalness,
  roughness: COLORS_HISTORY[0].roughness,
  emissive: new THREE.Color(COLORS_HISTORY[0].emissive),
  emissiveIntensity: 0.8,
  envMapIntensity: 1.5,
});

// color transition state
let targetColor    = new THREE.Color(COLORS_HISTORY[0].hex);
let targetEmissive = new THREE.Color(COLORS_HISTORY[0].emissive);
let targetMetal    = COLORS_HISTORY[0].metalness;
let targetRough    = COLORS_HISTORY[0].roughness;
let transProgress  = 1; // 0→1 transition
const TRANS_SPEED  = 0.045;

/* ════════════════════════════════════════
   SCENE MODELS
════════════════════════════════════════ */
let currentMesh = null;
let currentArtifact = 0;
let autoRotate = true;
let modelRotY = .3, modelRotX = 0;

function buildArtifact(idx) {
  if(currentMesh) {
    scene.remove(currentMesh);
    currentMesh.traverse(c=>{ if(c.geometry) c.geometry.dispose(); });
  }
  currentMesh = BUILDERS[idx](mat);
  // entry scale anim
  currentMesh.scale.set(0,0,0);
  scene.add(currentMesh);
  let t=0;
  const grow = () => {
    t += .025; const s = Math.min(1, 1-(1-t)*(1-t)*(1-t));
    currentMesh.scale.set(s,s,s);
    if(t<1) requestAnimationFrame(grow);
  };
  grow();
}

buildArtifact(0);

/* ════════════════════════════════════════
   APPLY COLOR
════════════════════════════════════════ */
function getColorData(key) {
  if(key.startsWith('h')) return COLORS_HISTORY[+key.slice(1)];
  return COLORS_FX[+key.slice(1)];
}

function applyColor(key) {
  if(activeSwatchKey === key) return;
  // deactivate old
  const old = document.getElementById('sw_'+activeSwatchKey);
  if(old) old.classList.remove('active');
  activeSwatchKey = key;
  const el = document.getElementById('sw_'+key);
  if(el) el.classList.add('active');

  const c = getColorData(key);
  targetColor    = new THREE.Color(c.hex);
  targetEmissive = new THREE.Color(c.emissive);
  targetMetal    = c.metalness;
  targetRough    = c.roughness;
  transProgress  = 0;

  // gradient texture
  if(c.gradient) {
    if(activeTex) activeTex.dispose();
    activeTex = makeGradientTex(c.gradient, c.neon||false);
    mat.map = activeTex;
  } else {
    if(activeTex) { activeTex.dispose(); activeTex=null; }
    mat.map = null;
  }
  mat.needsUpdate = true;

  document.getElementById('colorNameCn').textContent  = c.cn;
  document.getElementById('colorNameDesc').textContent = c.desc;

  // switch lighting preset
  applyLightPreset(key.startsWith('h') ? LIGHT_HISTORY : LIGHT_FX);

  // update glow color
  const h = new THREE.Color(c.hex);
  glowGrad.addColorStop(0, `rgba(${h.r*255|0},${h.g*255|0},${h.b*255|0},.20)`);
}

/* ════════════════════════════════════════
   ARTIFACT SELECT
════════════════════════════════════════ */
function selectArtifact(idx) {
  document.querySelectorAll('.artifact-card').forEach((el,i)=>{
    el.classList.toggle('active', i===idx);
  });
  currentArtifact = idx;
  buildArtifact(idx);
}

/* ════════════════════════════════════════
   CONTROLS
════════════════════════════════════════ */
function toggleRotate() {
  autoRotate = !autoRotate;
  document.getElementById('btnRotate').classList.toggle('active', autoRotate);
}
function resetCamera() {
  modelRotY = .3; modelRotX = 0;
}

// mouse drag
let isDragging=false, lastX=0, lastY=0;
canvas.addEventListener('mousedown', e=>{ isDragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mousemove', e=>{
  if(!isDragging||!currentMesh) return;
  modelRotY += (e.clientX-lastX)*.012;
  modelRotX += (e.clientY-lastY)*.008;
  modelRotX  = Math.max(-.6, Math.min(.6, modelRotX));
  lastX=e.clientX; lastY=e.clientY;
});
window.addEventListener('mouseup', ()=>{ isDragging=false; });

// zoom
let camZ = 5.5;
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  camZ = Math.max(2.5, Math.min(9, camZ + e.deltaY*.008));
}, { passive:false });

/* ════════════════════════════════════════
   RESIZE
════════════════════════════════════════ */
function onResize() {
  const el = canvas.parentElement;
  const w=el.clientWidth, h=el.clientHeight;
  renderer.setSize(w,h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
onResize();
const ro = new ResizeObserver(onResize);
ro.observe(canvas.parentElement);

/* ════════════════════════════════════════
   RENDER LOOP
════════════════════════════════════════ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // auto rotate
  if(autoRotate && currentMesh && !isDragging) {
    modelRotY += .004;
  }

  // apply rotation to model
  if(currentMesh) {
    currentMesh.rotation.y = modelRotY;
    currentMesh.rotation.x = modelRotX;
  }

  // camera zoom lerp
  camera.position.z += (camZ - camera.position.z) * .08;

  // color transition
  if(transProgress < 1) {
    transProgress = Math.min(1, transProgress + TRANS_SPEED);
    const t = transProgress;
    mat.color.lerp(targetColor, .08);
    mat.emissive.lerp(targetEmissive, .08);
    mat.metalness += (targetMetal - mat.metalness) * .06;
    mat.roughness += (targetRough - mat.roughness) * .06;
    // animate gradient texture UV offset for flowing effect
    if(mat.map && activeTex) {
      mat.map.offset.x += .0008;
      mat.map.offset.y += .0004;
    }
    mat.needsUpdate = true;
    document.getElementById('transBar').style.width = (t*100)+'%';
  } else {
    document.getElementById('transBar').style.width = '0%';
  }

  renderer.render(scene, camera);
}
animate();
</script>
</script>

<script>
/* ── BGM cross-page persistence ── */
(function() {
  const audio  = document.getElementById('bgmAudio');
  const ball   = document.getElementById('bgmBall');
  const iPlay  = document.getElementById('bgmIconPlay');
  const iPause = document.getElementById('bgmIconPause');
  const KEY_PLAYING = 'bgm_playing';
  const KEY_TIME    = 'bgm_time';

  // 页面音量配置：在这里统一管理各页面的 BGM 音量
  // character_page 需要语音交互，音量压低；其余页面正常
  const PAGE_VOLUME = {
    'character_page.html': 0.12,
    'artifact.html':           0.15,
  };
  const DEFAULT_VOLUME = 0.15;

  function getVolume() {
    const page = location.pathname.split('/').pop();
    return PAGE_VOLUME[page] ?? DEFAULT_VOLUME;
  }

  audio.volume = getVolume();

  let isPlaying = false;

  function setUI(playing) {
    isPlaying = playing;
    ball.classList.toggle('playing', playing);
    ball.classList.toggle('paused',  !playing);
    iPlay.style.display  = playing ? 'none'  : '';
    iPause.style.display = playing ? ''      : 'none';
  }

  function play() {
    audio.play().then(() => {
      setUI(true);
      localStorage.setItem(KEY_PLAYING, '1');
    }).catch(() => {});
  }

  function pause() {
    audio.pause();
    setUI(false);
    localStorage.setItem(KEY_PLAYING, '0');
  }

  // save position periodically
  setInterval(() => {
    if (isPlaying) localStorage.setItem(KEY_TIME, audio.currentTime);
  }, 1000);

  function restoreAndPlay() {
    const t = parseFloat(localStorage.getItem(KEY_TIME) || '0');
    if (t > 0) audio.currentTime = t;
    // play unless user explicitly paused
    if (localStorage.getItem(KEY_PLAYING) !== '0') {
      play();
    } else {
      setUI(false);
    }
  }

  // try immediate autoplay
  audio.addEventListener('canplay', function() {
    restoreAndPlay();
  }, { once: true });

  // fallback: autoplay on first user interaction if browser blocked it
  function onFirstInteraction() {
    if (!isPlaying && localStorage.getItem(KEY_PLAYING) !== '0') {
      play();
    }
    ['click','touchstart','keydown'].forEach(e => document.removeEventListener(e, onFirstInteraction));
  }
  ['click','touchstart','keydown'].forEach(e => document.addEventListener(e, onFirstInteraction, { once: true }));

  ball.addEventListener('click', () => {
    if (isPlaying) pause(); else play();
  });

  // save position before page unload
  window.addEventListener('pagehide', () => {
    localStorage.setItem(KEY_TIME, audio.currentTime);
    localStorage.setItem(KEY_PLAYING, isPlaying ? '1' : '0');
  });
})();
</script>
