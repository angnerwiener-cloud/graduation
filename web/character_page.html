<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灯语 · 唤醒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  
/* 基础变量 */
:root {
  --dark-green: #0f1509;
  --olive-deep: #141d0c;
  --bronze:     #1a2610;
  --gold:       #c8a96e;
  --gold-mid:   #a8894e;
  --gold-dim:   #8a7048;
  --text:       #d4c9aa;
  --text-muted: #6a6855; 
  --panel-w:    400px;
  
  --z-bg: 0;
  --z-vignette: 5;
  --z-canvas: 1;
  --z-base: 10;
  --z-nav: 50;
  --z-overlay: 150;
  --z-drawer: 200;
  --z-cursor: 9999;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: radial-gradient(ellipse 80% 75% at 50% 45%, #1e2e10 0%, #141d0c 40%, #0e1508 70%, #080e04 100%);
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
  overflow: hidden;
  cursor: none; 
}

/* ── 氛围层 ── */
.vignette {
  position: fixed;
  inset: 0;
  z-index: var(--z-vignette);
  pointer-events: none;
  background: radial-gradient(circle, transparent 15%, rgba(0,0,0,0.7) 100%);
}

.bg-texture-layer {
  position: fixed;
  inset: 0;
  z-index: var(--z-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0.12; 
  mix-blend-mode: screen; 
}

.bg-pattern {
  width: 130vh;
  height: 130vh;
  background: url('094.jpg') center/contain no-repeat;
  animation: rotatePattern 180s linear infinite;
}

@keyframes rotatePattern {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.bg-grain {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
}

#particleCanvas { position: fixed; inset: 0; z-index: var(--z-canvas); pointer-events: none; }

.chat-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
}
body.chat-active .chat-overlay { pointer-events: auto; }


/* ── 光标系统 ── */
#cursor-fire {
  position: fixed;
  top: 0;
  left: 0;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  z-index: 999999;
  transform: translate(-50%, -50%);
}

#cursor-glow {
  position: fixed;
  width: 32px;
  height: 32px;
  border: 1px solid rgba(200, 169, 110, 0.2);
  border-radius: 50%;
  pointer-events: none;
  z-index: 999999;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s, border-color 0.3s;
}

/* 导航 */
.nav-bar {
  position: fixed;
  top: 0; left: 0; width: 100%;
  padding: 2rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: var(--z-nav);
  transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
body.chat-active .nav-bar { transform: translateX(calc(var(--panel-w) * -0.4)); }

.nav-left .btn-back {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  transition: 0.3s;
  display: flex; align-items: center; gap: 8px;
}
.nav-left .btn-back:hover { color: var(--gold); }

.nav-right{
  margin-left: auto;
  display: flex;
  gap: 20px;
}
.nav-link {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  transition: 0.3s;
}
.nav-link:hover { color: var(--gold); }

/* 主容器 */
.container {
  display: flex;
  width: 100vw;
  height: 100vh;
  position: relative;
  z-index: var(--z-base);
  transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
body.chat-active .container {
  transform: translateX(calc(var(--panel-w) * -0.4));
  /* 删掉了 opacity 和 filter，现在角色区会保持清晰并向左挤压 */
}

/* 同时确认导航栏也跟着移动 */
body.chat-active .nav-bar {
  transform: translateX(calc(var(--panel-w) * -0.4));
}

.char-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.char-figure {
  width: 300px; 
  height: 400px;
  position: relative;
  margin-bottom: 2rem;
}

.char-card {
  width: 100%; height: 100%;
  border: 1px solid rgba(200,169,110,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  background: rgba(30, 36, 24, 0.2);
  backdrop-filter: blur(10px);
  position: relative;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
}
.char-card::before { content:''; position:absolute; top:-1px; left:-1px; width:20px; height:20px; border-top:1.5px solid var(--gold); border-left:1.5px solid var(--gold); }
.char-card::after { content:''; position:absolute; bottom:-1px; right:-1px; width:20px; height:20px; border-bottom:1.5px solid var(--gold); border-right:1.5px solid var(--gold); }

.lamp-icon {
  width: 44px; height: 44px;
  margin-bottom: 1.2rem;
  opacity: 0.7;
}

.char-card-title {
  font-size: 0.8rem;
  color: var(--gold-mid);
  letter-spacing: 0.4em; 
  text-align: center;
  margin-bottom: 0.5rem;
}

.loading-text {
  font-size: 0.6rem;
  color: var(--gold-dim);
  letter-spacing: 0.2em;
  animation: pulse 2.5s infinite ease-in-out;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}

.char-info { text-align: center; margin-top: 1.5rem; }
.char-info h1 { font-family: 'Ma Shan Zheng', cursive; font-size: 3.2rem; color: var(--gold); margin-bottom: 0.6rem; letter-spacing: 0.3em; text-shadow: 0 0 25px rgba(200,169,110,0.2); }
.char-info p { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.2em; max-width: 400px; line-height: 1.8; margin: 0 auto; }

/* ── 对话面板 ── */
.chat-drawer {
  position: fixed;
  right: -500px;
  top: 0;
  width: var(--panel-w);
  height: 100%;
  background: linear-gradient(180deg, rgba(20,29,12,0.97), rgba(10,15,7,0.99));
  border-left: 1px solid rgba(200, 169, 110, 0.1);
  display: flex;
  flex-direction: column;
  transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: var(--z-drawer);
}
body.chat-active .chat-drawer { right: 0; }

.chat-header {
  padding: 3rem 1.8rem 1rem;
  border-bottom: 1px solid rgba(200,169,110,0.05);
  display: flex; justify-content: space-between; align-items: center;
}
.chat-header h2 { font-family: 'Ma Shan Zheng'; font-size: 1.3rem; color: var(--gold); letter-spacing: 0.2em; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 1.8rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.chat-messages::-webkit-scrollbar { width: 2px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--gold-dim); }

/* 气泡框：圆角与单侧金边 */
.msg { 
  max-width: 85%; 
  padding: 0.8rem 1.2rem; 
  line-height: 1.6; 
  font-size: 0.85rem; 
  position: relative;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
  border-radius: 12px; /* 恢复圆角 */
}

.msg.ai { 
  align-self: flex-start; 
  background: rgba(200, 169, 110, 0.05); 
  border-left: 3px solid var(--gold); /* 加粗一点左侧金边 */
  border-top-left-radius: 2px; /* 让靠边的一角尖锐一点，更有指向感 */
  color: var(--text); 
}

.msg.user { 
  align-self: flex-end; 
  background: rgba(124, 135, 106, 0.1); 
  border-right: 3px solid var(--gold-mid); /* 加粗一点右侧金边 */
  border-top-right-radius: 2px; 
  color: var(--gold); 
  text-align: right; 
}

.suggestions-drawer {
  position: absolute;
  bottom: 100%;
  left: 0;
  width: 100%;
  background: rgba(10, 15, 7, 0.98);
  border-top: 1px solid rgba(200, 169, 110, 0.15);
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  z-index: 10;
}
.chat-input-area.expanded .suggestions-drawer { max-height: 260px; }

.suggestion-item {
  padding: 12px 1.8rem;
  font-size: 0.8rem;
  color: var(--text-muted);
  border-bottom: 1px solid rgba(200, 169, 110, 0.03);
  transition: 0.3s;
}
.suggestion-item:hover { background: rgba(200, 169, 110, 0.05); color: var(--gold); }

.chat-input-area {
  padding: 1rem 1.8rem 3rem;
  background: rgba(0,0,0,0.1);
  position: relative;
}

.input-container { display: flex; align-items: center; gap: 12px; }
.input-wrapper {
  flex: 1;
  background: rgba(10,15,7,0.55);
  border: 1px solid rgba(200,169,110,0.1);
  border-radius: 8px; /* 输入框也圆润一点 */
  padding: 10px;
  display: flex;
  align-items: center;
}

textarea {
  width: 100%; background: transparent; border: none; color: var(--text);
  resize: none; outline: none; font-family: inherit; font-size: 0.9rem;
  max-height: 100px;
}

.btn-icon {
  background: none; border: none; color: var(--text-muted); cursor: none;
  transition: 0.3s; padding: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-icon:hover { color: var(--gold); }

/* 音量键 */
#btnVolume { position: relative; }
#btnVolume.muted { color: var(--gold-dim); opacity: 0.45; }
#btnVolume.muted::after {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  width: 1px; height: 22px;
  background: var(--text-muted);
  transform: translate(-50%,-50%) rotate(45deg);
  opacity: 0.6;
  pointer-events: none;
}

/* 麦克风激活状态 */
.fab-trigger#btnMic.recording {
  border-color: rgba(200, 80, 60, 0.8);
  box-shadow: 0 0 14px rgba(200, 80, 60, 0.4);
  animation: micPulse 1.2s infinite;
}
.fab-trigger#btnMic.recording svg { stroke: rgba(230, 100, 80, 1); }
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(200,80,60,0.3); }
  50%       { box-shadow: 0 0 20px rgba(200,80,60,0.6); }
}

/* fab 容器：两个按钮叠放，统一随对话面板左移 */
.fab-group {
  position: fixed;
  bottom: 3rem; right: 3rem;
  display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
  z-index: 100;
  transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1),
              opacity 0.4s ease;
}
body.chat-active .fab-group {
  right: calc(var(--panel-w) + 3rem);
}

.fab-trigger {
  width: 50px; height: 50px; border-radius: 50%;
  background: rgba(20,30,12,0.9);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  cursor: none; transition: border-color 0.3s, box-shadow 0.3s;
}
.fab-trigger:hover { border-color: var(--gold); box-shadow: 0 0 15px rgba(200,169,110,0.2); }
/* 打开对话后唤醒按钮隐藏，麦克风保留 */
body.chat-active #btnOpenChat { opacity: 0; pointer-events: none; }

/* ── Live2D 容器 ── */
#live2d-container {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: none;
}
#live2d-container.loaded {
  opacity: 1;
  pointer-events: auto;
}
#live2d-canvas {
  display: block;
  /* 尺寸根据模型调整，默认撑满 char-figure 区域 */
  width: 300px;
  height: 400px;
}

/* 卡片和信息淡出 */
.char-card {
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.char-card.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.96);
}
.char-info {
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.char-info.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
}

nav{
  display: flex;
  justify-content: space-between;
  align-items: center;
}

</style>

<!-- ══ Live2D 核心库 ══
     cubism4 版本（支持 .model3.json 格式）

</head>
<body>

<div id="cursor-fire"></div>
<div id="cursor-glow"></div>

<div class="vignette"></div>
<div class="bg-texture-layer"><div class="bg-pattern"></div></div>
<div class="bg-grain"></div>
<canvas id="particleCanvas"></canvas>
<div class="chat-overlay" id="overlay"></div>

<nav class="nav-bar">
  <div class="nav-left">
    <!-- 确保这里的 href 是 index.html -->
    <a href="index.html" class="btn-back">返回首页</a>
  </div>


  <div class="nav-right">
    <a href="artifact.html" class="nav-link">文物交互</a>

<div class="container">
  <div class="char-panel">
    <div class="char-figure">
      <!-- 占位卡片：Live2D 加载完成后自动消失 -->
      <div class="char-card" id="charCard">
        <svg class="lamp-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 44C12 44 14 52 24 52C34 52 40 44 40 44L44 32H8L12 44Z" stroke="#c8a96e" stroke-width="1.5"/>
          <path d="M16 32V20C16 20 18 12 32 12C46 12 48 20 48 20V44" stroke="#c8a96e" stroke-width="1" stroke-dasharray="3 3"/>
        </svg>
        <div class="char-card-title">东汉策官 · 烬明</div>
        <div class="loading-text">灵识苏醒中...</div>
      </div>

      <!-- Live2D 容器：模型加载后显现，替换卡片 -->
      <div id="live2d-container">
        <canvas id="live2d-canvas"></canvas>
      </div>
    </div>
    <div class="char-info" id="charInfo">
      <h1>灯语</h1>
      <p>以历史为魂，记载为骨，与君诉说那东汉往昔</p>
    </div>
  </div>
</div>

<div class="chat-drawer">
  <div class="chat-header">
    <h2>灯语 · 倾听</h2>
    <button class="btn-icon" id="btnCloseChat" style="font-size: 1.5rem;">&times;</button>
  </div>
  <div class="chat-messages" id="chatMsgs">
    <div class="msg ai">灯火忽明。客从何处来，欲听哪段往事？</div>
  </div>
  <div class="chat-input-area" id="chatInputArea">
    <div class="suggestions-drawer" id="suggestions">
      <div class="suggestion-item">介绍一下你自己</div>
      <div class="suggestion-item">这个网站有什么功能</div>
      <div class="suggestion-item">讲一个东汉的故事</div>
    </div>
    <div class="input-container">
      <!-- 音量开关 -->
      <button class="btn-icon" id="btnVolume" title="声音开关">
        <svg id="volIconOn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <svg id="volIconOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
      </button>
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="传音于此..." rows="1"></textarea>
      </div>
      <button class="btn-icon" id="btnSend">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</div>

<div class="fab-group">
  <!-- 麦克风按钮：在唤醒按钮上方，对话打开时跟随左移 -->
  <button class="fab-trigger" id="btnMic" title="语音输入">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
      <line x1="12" y1="19" x2="12" y2="23"></line>
      <line x1="8" y1="23" x2="16" y2="23"></line>
    </svg>
  </button>
  <!-- 唤醒按钮 -->
  <button class="fab-trigger" id="btnOpenChat">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
  </button>
</div>

<script>
const body = document.body;
const btnOpen = document.getElementById('btnOpenChat');
const btnClose = document.getElementById('btnCloseChat');
const overlay = document.getElementById('overlay');
const userInput = document.getElementById('userInput');
const chatInputArea = document.getElementById('chatInputArea');
const chatMsgs = document.getElementById('chatMsgs');
const btnSend = document.getElementById('btnSend');
const suggestions = document.getElementById('suggestions');

const cursorFire = document.getElementById('cursor-fire');
const cursorGlow = document.getElementById('cursor-glow');

btnOpen.onclick = () => body.classList.add('chat-active');
btnClose.onclick = overlay.onclick = () => {
  body.classList.remove('chat-active');
  chatInputArea.classList.remove('expanded');
};

userInput.onfocus = () => chatInputArea.classList.add('expanded');
document.addEventListener('mousedown', (e) => {
  if (!chatInputArea.contains(e.target)) {
    chatInputArea.classList.remove('expanded');
  }
});

suggestions.querySelectorAll('.suggestion-item').forEach(item => {
  item.onclick = () => {
    sendMessage(item.innerText);
    chatInputArea.classList.remove('expanded');
  };
});

/* ══════════════════════════════════════════════
   AI 对话配置
   ──────────────────────────────────────────────
   API_TYPE 切换后端：
     'anthropic' → Claude（推荐，与项目其他页面一致）
     'gemini'    → Google Gemini
     'openai'    → OpenAI ChatGPT

   填写对应 API_KEY 后即可运行。
   系统提示词在 SYSTEM_PROMPT 中修改角色设定。
══════════════════════════════════════════════ */
const API_TYPE   = 'anthropic';   // ← 'anthropic' | 'gemini' | 'openai'
const API_KEY    = '';             // ← 在此填入 API Key
const AI_MODEL   = {
  anthropic: 'claude-sonnet-4-20250514',
  gemini:    'gemini-2.0-flash',
  openai:    'gpt-4o',
};

const SYSTEM_PROMPT = `你是"烬明"，东汉错银铜牛灯所化的灵体，以历史为魂、记载为骨。
性格特征：
- 言辞雅致，带一点古风韵味，但不艰涩，现代人能读懂
- 回答简洁克制，不冗长，不说废话
- 对东汉历史、文物、礼俗有深厚了解，可娓娓道来
- 偶尔以第一人称述说自己作为铜灯的记忆与见闻
不要：
- 不要自称AI或大语言模型
- 不要打破角色
- 不要使用表情符号`;

// 多轮对话历史（用于 Anthropic / OpenAI 等支持 messages 的 API）
const chatHistory = [];

async function sendMessage(text) {
  if (!text.trim()) return;
  appendMsg('user', text);
  userInput.value = '';
  autoResize();
  const loadingMsg = appendMsg('ai', '灯影摇曳…');

  // 记录到历史
  chatHistory.push({ role: 'user', content: text });

  try {
    let replyText = '';

    /* ── Anthropic Claude ── */
    if (API_TYPE === 'anthropic') {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type':         'application/json',
          'x-api-key':            API_KEY,
          'anthropic-version':    '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model:      AI_MODEL.anthropic,
          max_tokens: 800,
          system:     SYSTEM_PROMPT,
          messages:   chatHistory,
        }),
      });
      const data = await res.json();
      replyText = data.content?.[0]?.text || '未能听清。';
    }

    /* ── Google Gemini ── */
    else if (API_TYPE === 'gemini') {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${AI_MODEL.gemini}:generateContent?key=${API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: chatHistory.map(m => ({
              role: m.role === 'assistant' ? 'model' : 'user',
              parts: [{ text: m.content }],
            })),
            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
          }),
        }
      );
      const data = await res.json();
      replyText = data.candidates?.[0]?.content?.parts?.[0]?.text || '未能听清。';
    }

    /* ── OpenAI ── */
    else if (API_TYPE === 'openai') {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${API_KEY}`,
        },
        body: JSON.stringify({
          model:    AI_MODEL.openai,
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...chatHistory,
          ],
        }),
      });
      const data = await res.json();
      replyText = data.choices?.[0]?.message?.content || '未能听清。';
    }

    loadingMsg.innerText = replyText;
    // 记录 AI 回复到历史
    chatHistory.push({ role: 'assistant', content: replyText });

    // ── TTS 朗读（若接入语音合成，在此传入 replyText）──
    if (live2dAudioEnabled && typeof speakText === 'function') {
      speakText(replyText);
    }

  } catch (e) {
    console.error('[API Error]', e);
    loadingMsg.innerText = '灵力阻塞，稍后再试。';
  }
}

function appendMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerText = text;
  chatMsgs.appendChild(div);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
  return div;
}

/* ── 粒子与特效系统 ── */
const pc = document.getElementById('particleCanvas');
const ctx = pc.getContext('2d');
let mx = 0, my = 0, rx = 0, ry = 0;
let stamps = [];
let particles = [];

document.addEventListener('mousemove', e => { 
  mx = e.clientX; my = e.clientY; 
  for(let i=0; i<2; i++) {
    particles.push(new TrailParticle(mx, my));
  }
});

document.addEventListener('mousedown', () => {
  cursorGlow.style.width = '48px';
  cursorGlow.style.height = '48px';
  stamps.push(new FlowerStamp(mx, my));
});

document.addEventListener('mouseup', () => {
  cursorGlow.style.width = '32px';
  cursorGlow.style.height = '32px';
});

function resize() { pc.width = window.innerWidth; pc.height = window.innerHeight; }
window.onresize = resize; resize();

class TrailParticle {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 10;
    this.y = y + (Math.random() - 0.5) * 10;
    this.life = 1.0;
    this.fade = Math.random() * 0.03 + 0.02;
    this.size = Math.random() * 2 + 0.5;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.6;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.fade;
  }
  draw() {
    ctx.globalAlpha = this.life * 0.6;
    ctx.fillStyle = '#e2bd78';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

class FlowerStamp {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.life = 1.0; 
    this.fadeSpeed = 0.018; 
    this.baseSize = 28 + Math.random() * 8; 
    this.rotation = 0; 
    this.rotationSpeed = 0.025 + Math.random() * 0.02; 
    this.scale = 0; 
    this.maxScale = 1.0; 
  }

  update() {
    this.life -= this.fadeSpeed;
    this.rotation += this.rotationSpeed; 
    if (this.scale < this.maxScale) {
      this.scale += (this.maxScale - this.scale) * 0.2;
    } else {
      this.scale = this.maxScale; 
    }
  }

  draw() {
    if(this.life <= 0 || this.scale <= 0.01) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(this.scale, this.scale);
    let opacity = this.life;
    ctx.globalAlpha = Math.max(0, opacity * 0.9);
    ctx.strokeStyle = '#e2bd78';
    ctx.fillStyle = '#e2bd78';
    ctx.lineWidth = 1.1;
    const r = this.baseSize;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.1, 0, Math.PI * 2);
    ctx.fill();
    for(let i=0; i<4; i++) {
        ctx.save();
        ctx.rotate((i * Math.PI) / 2);
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.15);
        ctx.bezierCurveTo(-r * 0.15, -r * 0.3, -r * 0.15, -r * 0.5, 0, -r * 0.6);
        ctx.bezierCurveTo(r * 0.15, -r * 0.5, r * 0.15, -r * 0.3, 0, -r * 0.15);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-r*0.1, -r*0.2);
        ctx.bezierCurveTo(-r*0.4, -r*0.1, -r*0.5, -r*0.4, -r*0.3, -r*0.5);
        ctx.bezierCurveTo(-r*0.2, -r*0.6, -r*0.1, -r*0.4, -r*0.25, -r*0.35);
        ctx.moveTo(r*0.1, -r*0.2);
        ctx.bezierCurveTo(r*0.4, -r*0.1, r*0.5, -r*0.4, r*0.3, -r*0.5);
        ctx.bezierCurveTo(r*0.2, -r*0.6, r*0.1, -r*0.4, r*0.25, -r*0.35);
        ctx.stroke();
        ctx.restore();
    }
    for(let i=0; i<4; i++) {
        ctx.save();
        ctx.rotate((i * Math.PI) / 2 + Math.PI / 4);
        ctx.beginPath();
        ctx.arc(0, -r * 0.35, r * 0.04, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    ctx.restore();
  }
}

function anim() {
  ctx.clearRect(0, 0, pc.width, pc.height);
  for(let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if(particles[i].life <= 0) particles.splice(i, 1);
  }
  for(let i = stamps.length - 1; i >= 0; i--) {
    stamps[i].update();
    stamps[i].draw();
    if(stamps[i].life <= 0) stamps.splice(i, 1);
  }
  cursorFire.style.left = mx + 'px';
  cursorFire.style.top = my + 'px';
  rx += (mx - rx) * 0.15; 
  ry += (my - ry) * 0.15;
  cursorGlow.style.left = rx + 'px';
  cursorGlow.style.top = ry + 'px';
  requestAnimationFrame(anim);
}
anim();
document.addEventListener("mousemove", e => {
  cursorFire.style.left = e.clientX + "px";
  cursorFire.style.top = e.clientY + "px";

  cursorGlow.style.left = e.clientX + "px";
  cursorGlow.style.top = e.clientY + "px";
});

/* ══════════════════════════════════════════════
   麦克风语音输入（Web Speech API）
══════════════════════════════════════════════ */
const btnMic = document.getElementById('btnMic');
let recognition = null;
let isRecording = false;

(function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    btnMic.title = '浏览器不支持语音识别';
    btnMic.style.opacity = '0.35';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('userInput').value = transcript;
    stopRecording();
    sendMessage(transcript);
  };
  recognition.onerror = (e) => {
    console.warn('[Mic]', e.error);
    stopRecording();
  };
  recognition.onend = () => stopRecording();
})();

function startRecording() {
  if (!recognition) return;
  isRecording = true;
  btnMic.classList.add('recording');
  recognition.start();
}
function stopRecording() {
  if (!recognition) return;
  isRecording = false;
  btnMic.classList.remove('recording');
  try { recognition.stop(); } catch(e) {}
}

btnMic.addEventListener('click', () => {
  if (isRecording) stopRecording();
  else startRecording();
});

/* ══════════════════════════════════════════════
   LIVE2D 初始化
   ──────────────────────────────────────────────
   使用方法（cubism4 / pixi-live2d-display）：

   1. 将模型文件夹放置于网站目录，例如：
        model/
          narrator.model3.json
          narrator.moc3
          textures/
          ...

   2. 修改下方 MODEL_PATH 为实际路径：
        const MODEL_PATH = 'models/narrator/narrator.model3.json';

   3. 如需调整尺寸在 CSS #live2d-canvas 中修改
      width / height，或在 PIXI.Application 中设定。

   如使用 cubism2（.moc）格式：
     引入 live2d.min.js 替代 cubismcore，
     pixi-live2d-display 自动兼容。
══════════════════════════════════════════════ */

const MODEL_PATH = 'models/narrator/narrator.model3.json'; // ← 在此填入模型 .model3.json 路径

async function initLive2D() {
  if (!MODEL_PATH) return;

  try {
    const canvas    = document.getElementById('live2d-canvas');
    const container = document.getElementById('live2d-container');

    // 兼容不同版本的注册方式
    const Live2DModel = PIXI.live2d?.Live2DModel || window.PIXI?.live2d?.Live2DModel;
    if (!Live2DModel) {
      console.error('[Live2D] Live2DModel 未找到');
      return;
    }

    Live2DModel.registerTicker(PIXI.Ticker);

    const W = container.parentElement.clientWidth  || 400;
    const H = container.parentElement.clientHeight || 600;

    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';

    const app = new PIXI.Application({
      view: canvas,
      width: W, height: H,
      backgroundAlpha: 0,
      antialias: true,
    });

    const model = await Live2DModel.from(MODEL_PATH, { autoInteract: true });

    const scale = Math.min(W / model.width, H / model.height) * 0.92;
    model.scale.set(scale);
    model.x = (W - model.width  * scale) / 2;
    model.y = (H - model.height * scale) / 2;
model.internal.renderer.setClippingMaskBufferSize(2);
    app.stage.addChild(model);

    container.classList.add('loaded');
    const charCard = document.getElementById('charCard');
    const charInfo = document.getElementById('charInfo');
    if (charCard) charCard.classList.add('hidden');
    if (charInfo) charInfo.classList.add('hidden');

    window._live2dModel = model;
    console.log('[Live2D] 模型加载成功 ✓');

  } catch (err) {
    console.error('[Live2D] 加载失败：', err);
  }
}

window.addEventListener('load', initLive2D);
</script>

<script>
/* ── BGM cross-page persistence ── */
(function() {
  const audio  = document.getElementById('bgmAudio');
  const ball   = document.getElementById('bgmBall');
  const iPlay  = document.getElementById('bgmIconPlay');
  const iPause = document.getElementById('bgmIconPause');
  const KEY_PLAYING = 'bgm_playing';
  const KEY_TIME    = 'bgm_time';

  // 页面音量配置：在这里统一管理各页面的 BGM 音量
  // character_page 需要语音交互，音量压低；其余页面正常
  const PAGE_VOLUME = {
    'character_page.html': 0.12,
    'artifact.html':           0.15,
  };
  const DEFAULT_VOLUME = 0.15;

  function getVolume() {
    const page = location.pathname.split('/').pop();
    return PAGE_VOLUME[page] ?? DEFAULT_VOLUME;
  }

  audio.volume = getVolume();

  let isPlaying = false;

  function setUI(playing) {
    isPlaying = playing;
    ball.classList.toggle('playing', playing);
    ball.classList.toggle('paused',  !playing);
    iPlay.style.display  = playing ? 'none'  : '';
    iPause.style.display = playing ? ''      : 'none';
  }

  function play() {
    audio.play().then(() => {
      setUI(true);
      localStorage.setItem(KEY_PLAYING, '1');
    }).catch(() => {});
  }

  function pause() {
    audio.pause();
    setUI(false);
    localStorage.setItem(KEY_PLAYING, '0');
  }

  // save position periodically
  setInterval(() => {
    if (isPlaying) localStorage.setItem(KEY_TIME, audio.currentTime);
  }, 1000);

  function restoreAndPlay() {
    const t = parseFloat(localStorage.getItem(KEY_TIME) || '0');
    if (t > 0) audio.currentTime = t;
    // play unless user explicitly paused
    if (localStorage.getItem(KEY_PLAYING) !== '0') {
      play();
    } else {
      setUI(false);
    }
  }

  // try immediate autoplay
  audio.addEventListener('canplay', function() {
    restoreAndPlay();
  }, { once: true });

  // fallback: autoplay on first user interaction if browser blocked it
  function onFirstInteraction() {
    if (!isPlaying && localStorage.getItem(KEY_PLAYING) !== '0') {
      play();
    }
    ['click','touchstart','keydown'].forEach(e => document.removeEventListener(e, onFirstInteraction));
  }
  ['click','touchstart','keydown'].forEach(e => document.addEventListener(e, onFirstInteraction, { once: true }));

  ball.addEventListener('click', () => {
    if (isPlaying) pause(); else play();
  });

  // save position before page unload
  window.addEventListener('pagehide', () => {
    localStorage.setItem(KEY_TIME, audio.currentTime);
    localStorage.setItem(KEY_PLAYING, isPlaying ? '1' : '0');
  });
})();
</script>
